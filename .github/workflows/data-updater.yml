name: K-Stock Analyst & Threads Publishing Daemon

on:
  schedule:
    # 07:40 KST (Runs Monday to Friday KST: Sunday to Thursday UTC 22:40)
    - cron: '40 22 * * 0-4'
    # 15:40 KST (Runs Monday to Friday KST: 06:40 UTC)
    - cron: '40 6 * * 1-5'
    # 16:00 KST (Runs Monday to Friday KST: 07:00 UTC)
    - cron: '0 7 * * 1-5'
    # 12:00, 15:00, 20:00 KST (UTC 03:00, 06:00, 11:00)
    - cron: '0 3,6,11 * * *'
  workflow_dispatch:
    inputs:
      job_type:
        description: 'Choose the job to trigger manually'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - pre_market
          - leading_stocks
          - post_market
          - insight_column

jobs:
  run-analyst:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Vercel APIs
        run: |
          PRODUCTION_URL="${{ secrets.PRODUCTION_URL }}"
          if [ -z "$PRODUCTION_URL" ]; then
            PRODUCTION_URL="https://k-stockreplay.pe.kr"
          fi
          
          AUTH_HEADER=""
          if [ ! -z "${{ secrets.CRON_SECRET }}" ]; then
            AUTH_HEADER="Authorization: Bearer ${{ secrets.CRON_SECRET }}"
          fi

          if [ "${{ github.event.schedule }}" = "40 22 * * 0-4" ] || [ "${{ github.event.inputs.job_type }}" = "pre_market" ] || [ "${{ github.event.inputs.job_type }}" = "all" ]; then
            echo "Triggering Pre-Market News..."
            curl -s -X POST -H "$AUTH_HEADER" "$PRODUCTION_URL/api/cron/pre-market"
          fi
          
          if [ "${{ github.event.schedule }}" = "40 6 * * 1-5" ] || [ "${{ github.event.inputs.job_type }}" = "leading_stocks" ] || [ "${{ github.event.inputs.job_type }}" = "all" ]; then
            echo "Triggering Leading Stocks..."
            curl -s -X POST -H "$AUTH_HEADER" "$PRODUCTION_URL/api/cron/leading-stocks"
          fi

          if [ "${{ github.event.schedule }}" = "0 7 * * 1-5" ] || [ "${{ github.event.inputs.job_type }}" = "post_market" ] || [ "${{ github.event.inputs.job_type }}" = "all" ]; then
            echo "Triggering Post-Market News..."
            curl -s -X POST -H "$AUTH_HEADER" "$PRODUCTION_URL/api/cron/post-market"
          fi

          if [ "${{ github.event.schedule }}" = "0 3,6,11 * * *" ] || [ "${{ github.event.inputs.job_type }}" = "insight_column" ] || [ "${{ github.event.inputs.job_type }}" = "all" ]; then
            echo "Triggering Insight Column..."
            curl -s -X POST -H "$AUTH_HEADER" "$PRODUCTION_URL/api/cron/insight-column"
          fi
