name: Stock Data Collector Cron Pipeline

on:
  schedule:
    # 07:40 KST (UTC 22:40 previous day) - Pre-market briefing & stock data collection
    - cron: '40 22 * * *'
    # 15:40 KST (UTC 06:40) - Post-market close report & stock data collection
    - cron: '40 6 * * *'
  workflow_dispatch:
    inputs:
      target_endpoint:
        description: 'Endpoint to trigger (collect-stocks / briefing / market-close / facts)'
        required: false
        default: 'collect-stocks'

jobs:
  collect-stock-data:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Stock Collection Pipeline
        run: |
          APP_URL="${{ secrets.APP_URL }}"
          if [ -z "$APP_URL" ]; then
            APP_URL="https://ais-dev-tlmuwzipcipunlemoa2ytr-454899791369.asia-east1.run.app"
          fi
          
          ENDPOINT="${{ github.event.inputs.target_endpoint }}"
          if [ -z "$ENDPOINT" ]; then
            ENDPOINT="collect-stocks"
          fi

          CRON_TOKEN="${{ secrets.CRON_SECRET }}"
          if [ -z "$CRON_TOKEN" ]; then
            CRON_TOKEN="kstock_cron_secret_2026"
          fi

          echo "Triggering $APP_URL/api/cron/$ENDPOINT ..."
          
          HTTP_STATUS=$(curl -s -o /tmp/cron_response.json -w "%{http_code}" -X POST "$APP_URL/api/cron/$ENDPOINT" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $CRON_TOKEN" \
            -H "x-cron-secret: $CRON_TOKEN")
            
          echo "HTTP Status: $HTTP_STATUS"
          echo "Response Payload:"
          cat /tmp/cron_response.json
          echo ""

          if [ "$HTTP_STATUS" -ne 200 ]; then
            echo "Error: Cron Pipeline returned status $HTTP_STATUS"
            exit 1
          fi
