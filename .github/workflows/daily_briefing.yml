name: Daily Pre-Market Briefing Automation

on:
  schedule:
    # 07:40 KST (KST = UTC+9) -> 22:40 UTC of the previous day
    # Runs Monday to Friday (1-5)
    - cron: '40 22 * * 1-5'
  workflow_dispatch: # Allows manual trigger

jobs:
  generate-and-insert:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Dependencies
        run: npm install @supabase/supabase-js axios

      - name: Execute Daily Briefing Script
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: node scripts/generate_daily_briefing.js
